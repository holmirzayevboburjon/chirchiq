<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yangi Chirchiq</title>

<link rel="stylesheet" href="css/tilda-grid-3.0.min.css">
<link rel="stylesheet" href="css/tilda-popup-1.1.min.css">

<script src="js/tilda-scripts-3.0.min.js" defer></script>
<script src="js/tilda-popup-1.0.min.js" defer></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url("images/tild3565-6164-4265-b536-303864626466__photo_52964293993034.jpg") center/cover;
}

.btn{
background:#e8c66b;
color:black;
padding:20px 40px;
border-radius:10px;
font-size:24px;
font-weight:bold;
cursor:pointer;
border:none;
}
</style>
</head>

<body>


<div class="hero">

<h1>
<span style="color:#efcc6e">56 MLN SO’M</span> BOSHLANG’ICH TO’LOV BILAN  
<span style="color:#efcc6e">24 OYGA</span>  
YANGI CHIRCHIQ LOYIHASIDAN XONADON XARID QILING!
</h1>

<br>

<button class="btn" onclick="openPopup()">
Bepul qatnashish
</button>

</div>



<div id="popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); align-items:center; justify-content:center">

<div style="background:white; padding:40px; width:350px; border-radius:10px; color:black">

<h3>Taqdimot kanalga qo'shilish uchun ma'lumot qoldiring</h3>

<form id="leadForm">

<input
type="text"
name="name"
placeholder="Ism"
required
style="width:100%; padding:10px; margin-top:10px"
/>

<input
type="tel"
name="phone"
placeholder="+998 90 000 00 00"
required
style="width:100%; padding:10px; margin-top:10px"
/>

<br><br>

<button class="btn" type="submit">
Yuborish
</button>

</form>

<br>

<button onclick="closePopup()">Yopish</button>

</div>

</div>



<script>

function openPopup(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}


document.getElementById("leadForm").addEventListener("submit",async function(e){

e.preventDefault()

const name=this.name.value
const phone=this.phone.value

const res=await fetch("/api/lead",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({name,phone,page:location.href})
})

const data=await res.json()

if(data.ok){

alert("Ma'lumot yuborildi")

this.reset()

closePopup()

}else{

alert("Xatolik")

}

})

</script>


</body>
</html>
